                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>

                    <div class="header-icons">
                        <a href="#" class="icon-link">
                            <img src="images/heart small.svg" alt="Wishlist" width="28">
                        </a>
                        <a href="#" class="icon-link cart-icon">

                        <a href="#" class="icon-link">
